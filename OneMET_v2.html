<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>OneMET</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #DCDCE2; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .stage {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background:
      radial-gradient(120% 80% at 50% 0%, #E9E9EF 0%, #D7D7DE 60%, #CFCFD6 100%);
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2A6FDB",
  "units": "mg/dL",
  "radius": 20
}/*EDITMODE-END*/;

function Stage({ children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(1);
  useEffect(() => {
    const fit = () => {
      const s = Math.min((window.innerHeight - 32) / 874, (window.innerWidth - 32) / 402, 1);
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);
  return (
    <div className="stage">
      <div ref={ref} style={{ transform: `scale(${scale})`, transformOrigin: 'center center' }}>
        {children}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState('summary');
  const [showGlucose, setShowGlucose] = useState(false);
  const [openWorkout, setOpenWorkout] = useState(null);
  const mmol = t.units === 'mmol/L';
  const accent = t.accent;

  useEffect(() => {
    document.documentElement.style.setProperty('--radius', t.radius + 'px');
  }, [t.radius]);

  const go = (id) => { setShowGlucose(false); setOpenWorkout(null); setTab(id); };

  let screen;
  if (showGlucose) {
    screen = <GlucoseDetail accent={accent} mmol={mmol} onBack={() => setShowGlucose(false)} />;
  } else if (openWorkout) {
    screen = <WorkoutDetailScreen workout={openWorkout} accent={accent} onBack={() => setOpenWorkout(null)} />;
  } else if (tab === 'summary') {
    screen = <SummaryScreen accent={accent} mmol={mmol}
      onOpenGlucose={() => setShowGlucose(true)}
      onGoActivity={() => setTab('workouts')} />;
  } else if (tab === 'workouts') {
    screen = <WorkoutsScreen accent={accent} onOpenWorkout={setOpenWorkout} />;
  } else if (tab === 'plan') {
    screen = <PlanScreen accent={accent} />;
  } else {
    screen = <ProfileScreen accent={accent} />;
  }

  return (
    <Stage>
      <div style={{ position: 'relative' }}>
        <IOSDevice>
          <div style={{ position: 'absolute', inset: 0 }}>
            {screen}
          </div>
          <TabBar active={showGlucose ? 'summary' : (openWorkout ? 'workouts' : tab)} onChange={go} accent={accent} />
        </IOSDevice>
      </div>
      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={t.accent}
          options={['#2A6FDB', '#1F8A5B', '#E0556E', '#7A5CD0', '#E8833A']}
          onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="Glucose" />
        <TweakRadio label="Units" value={t.units} options={['mg/dL', 'mmol/L']}
          onChange={(v) => setTweak('units', v)} />
        <TweakSection label="Style" />
        <TweakSlider label="Corner radius" value={t.radius} min={10} max={28} step={1} unit="px"
          onChange={(v) => setTweak('radius', v)} />
      </TweaksPanel>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
