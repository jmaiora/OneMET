# codemagic.yaml — CI/CD for OneMET (commit at repo root)
#
# Pipeline: generate project (XcodeGen) → sign → build IPA → upload to TestFlight.
# Runs on Codemagic's free individual tier (500 macOS M2 minutes/month).
#
# ─────────────────────────── ONE-TIME SETUP ───────────────────────────
# 1. App Store Connect API key:
#      ASC → Users and Access → Integrations → App Store Connect API →
#      create a key (Admin/App Manager), download the .p8, note Issuer ID + Key ID.
#      In Codemagic → Teams/Personal settings → Integrations → App Store Connect →
#      add the key and give it a NAME. Put that name below in `integrations`.
# 2. Developer portal: create the App ID for the bundle id below and tick the
#      HealthKit capability on it.
# 3. App Store Connect: create the app record (same bundle id) so TestFlight has
#      somewhere to receive the build.
# 4. Set the notification email below. (The integration name is already set to
#    `Api_onemet` and the bundle id to com.jmaiora.onemet — keep both consistent
#     with Codemagic, project.yml, and the App Store Connect record.)
# 5. Create a CERTIFICATE_PRIVATE_KEY variable in Codemagic (used to mint the
#    iOS distribution certificate — NOT the same as the .p8 API key):
#      a. Generate an RSA key on your PC:
#           ssh-keygen -t rsa -b 2048 -m PEM -f ios_distribution_private_key
#         (press Enter twice for no passphrase)
#      b. Codemagic → app settings → Environment variables:
#           name  = CERTIFICATE_PRIVATE_KEY
#           value = the full contents of the ios_distribution_private_key file
#                   (including the BEGIN/END lines)
#           group = appstore_credentials      ← referenced under `environment` below
#           tick "Secure"
# ───────────────────────────────────────────────────────────────────────

workflows:
  ios-testflight:
    name: OneMET • Build & TestFlight
    instance_type: mac_mini_m2          # free-tier Apple-silicon instance
    max_build_duration: 60

    integrations:
      app_store_connect: Api_onemet          # exact name of the integration in Codemagic

    environment:
      groups:
        - appstore_credentials               # ← must contain CERTIFICATE_PRIVATE_KEY (see setup note 5)
      vars:
        XCODE_PROJECT: "OneMET.xcodeproj"
        XCODE_SCHEME: "OneMET"
        BUNDLE_ID: "com.jmaiora.onemet"        # your real bundle id (must match project.yml + ASC)
      xcode: latest

    scripts:
      - name: Generate Xcode project from project.yml
        script: |
          set -e
          # XcodeGen install occasionally fails on the runner's Homebrew with
          # "Cellar/xcodegen/<v> is not a directory" during the bottle pour, leaving
          # xcodegen off PATH (exit 127). Clean any broken Cellar entry and retry;
          # if brew still can't produce a working binary, fall back to XcodeGen's
          # official release archive so the build never depends on the brew pour.
          if ! command -v xcodegen >/dev/null 2>&1; then
            CELLAR="$(brew --cellar 2>/dev/null || true)"
            [ -n "$CELLAR" ] && rm -rf "$CELLAR/xcodegen" 2>/dev/null || true
            brew install xcodegen || brew reinstall xcodegen || true
          fi
          if ! command -v xcodegen >/dev/null 2>&1; then
            echo "Homebrew install unavailable — fetching XcodeGen release binary"
            XCODEGEN_VERSION=2.46.0
            curl -fsSL -o /tmp/xcodegen.zip \
              "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
            unzip -q -o /tmp/xcodegen.zip -d /tmp/xcodegen-dist
            XCG_BIN="$(find /tmp/xcodegen-dist -type f -name xcodegen -path '*/bin/*' | head -1)"
            export PATH="$(dirname "$XCG_BIN"):$PATH"
          fi
          xcodegen --version
          xcodegen generate
      - name: Initialize the keychain
        script: keychain initialize
      - name: Fetch OR CREATE the signing certificate + provisioning profile
        script: |
          # --create builds the distribution profile (and a certificate, if the
          # account has none yet) for a brand-new app. This is the step the
          # automatic ios_signing block did NOT do, which is what produced
          # "No matching profiles found for bundle identifier ...".
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add the certificate to the keychain
        script: keychain add-certificates
      - name: Apply the profile to the Xcode project
        script: xcode-project use-profiles
      - name: Set the build number
        script: |
          # Codemagic's per-build counter keeps TestFlight build numbers increasing.
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build the signed IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - jmaiora@gmail.com               # ← build success/failure notifications
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups:                    # auto-distribute to a TestFlight group
        #   - "Internal testers"
        # submit_to_app_store: false      # flip to true (and add release notes in
                                          # ASC) when you're ready to push to review
